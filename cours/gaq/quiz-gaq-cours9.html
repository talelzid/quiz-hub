<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Quiz - Cours 9</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <div class="global-course-title">Gestion de l'assurance qualité</div>
    <h1>Quiz : Retour sur les normes et les modèles - Focus sur le TMMI (Cours 9)</h1>
    
    <div class="progress-container">
        <div class="progress-info">
            <span id="question-counter">Question 1 / 10</span>
            <div class="progress-stats">
                <span class="stat-badge incorrect"><span class="stat-icon">✕</span><span id="incorrect-count">0</span></span>
                <span class="stat-badge correct"><span class="stat-icon">✓</span><span id="correct-count">0</span></span>
            </div>
        </div>
        <div class="progress-bar-wrapper" id="progressBar"></div>
    </div>
    
    <div id="quiz-container" class="card"></div>
    
    <div id="feedback" class="feedback-container"></div>
    
    <div class="quiz-navigation">
        <button id="prevBtn" onclick="previousQuestion()">← Précédent</button>
        <button id="nextBtn" onclick="nextQuestion()">Suivant →</button>
    </div>
    
    <div id="result"></div>

    <script>
        const questions = [
            {
                        "q": "Selon la norme ISO/CEI 15939, quel est l'objectif principal d'une mesure logicielle?",
                        "options": [
                                    {
                                                "text": "Augmenter systématiquement le budget du projet",
                                                "explain": "ISO/CEI 15939 ne traite pas de gestion budgétaire comme objectif primaire des mesures."
                                    },
                                    {
                                                "text": "Acquérir une compréhension de la performance du processus",
                                                "explain": ""
                                    },
                                    {
                                                "text": "Éliminer entièrement tous les membres de l'équipe de test",
                                                "explain": "C'est une mauvaise pratique. Les mesures servent à optimiser, pas à éliminer le personnel."
                                    },
                                    {
                                                "text": "Remplacer le jugement humain dans la prise de décision",
                                                "explain": "Les mesures supporting la décision, elles ne la remplacent jamais complètement."
                                    }
                        ],
                        "correct": 1,
                        "correctExplain": "Selon ISO/CEI 15939, l'un des quatre objectifs clés d'une mesure est la compréhension : acquérir la compréhension de la performance du processus. Les trois autres objectifs sont l'évaluation du statut, la prédiction de performance future, et la direction des efforts d'amélioration. Ces quatre objectifs forment la base rationnelle pour établir un programme de mesure efficace."
            },
            {
                        "q": "Qu'est-ce qu'une mesure selon ISO/CEI 15939?",
                        "options": [
                                    {
                                                "text": "Une décision organisationnelle documentée dans un manuel de procédures",
                                                "explain": "Une mesure est un résultat concret d'observation, pas une décision administrative."
                                    },
                                    {
                                                "text": "Un nombre ou une fonction obtenue en observant une caractéristique ou une quantité physique",
                                                "explain": ""
                                    },
                                    {
                                                "text": "Un jugement subjectif basé sur l'expérience personnelle du testeur",
                                                "explain": "Une mesure doit être objective et quantifiable, pas subjective."
                                    },
                                    {
                                                "text": "Une liste de défauts identifiés durant les tests",
                                                "explain": "Bien que les défauts puissent être mesurés, une mesure est plus largement définie comme l'observation d'une caractéristique."
                                    }
                        ],
                        "correct": 1,
                        "correctExplain": "ISO/CEI 15939 définit clairement une mesure comme 'un nombre ou une fonction obtenue en observant une caractéristique ou une quantité physique'. Cette définition met l'accent sur le caractère quantitatif et objectif des mesures, ce qui les distingue des opinions ou des jugements subjectifs. Cette approche systématique est fondamentale pour estabelir des mesures fiables et valides."
            },
            {
                        "q": "Parmi les caractéristiques suivantes, laquelle est la plus critique pour une mesure effcace selon ISO/CEI 15939?",
                        "options": [
                                    {
                                                "text": "Être très complexe à calculer pour démontrer l'expertise technique",
                                                "explain": "La complexité n'est pas désirable; au contraire, les mesures accessibilité est clé."
                                    },
                                    {
                                                "text": "La pertinence : la mesure doit être pertinente par rapport à l'objectif",
                                                "explain": ""
                                    },
                                    {
                                                "text": "Être applicable uniquement en fin de projet pour révisions finales",
                                                "explain": "Les mesures doivent être collectées tout au long du projet, pas seulement à la fin."
                                    },
                                    {
                                                "text": "Ignorer les opinions des développeurs et testeurs",
                                                "explain": "L'acceptabilité par les parties prenantes est une caractéristique importante des mesures efficaces."
                                    }
                        ],
                        "correct": 1,
                        "correctExplain": "Parmi les cinq caractéristiques des mesures efficaces (pertinence, validité, fiabilité, accessibilité, acceptabilité), la pertinence est fondamentale : la mesure doit être directement liée aux objectifs d'amélioration. Sans pertinence, même une mesure valide et fiable sera inutile pour atteindre les objectifs d'assurance qualité. Ceci garantit que les efforts de mesure suivent une direction stratégique claire."
            },
            {
                        "q": "Comment les niveaux de maturité du CMMI (Capability Maturity Model Integration) reflètent-ils la progression de la maîtrise des processus de développement?",
                        "options": [
                                    {
                                                "text": "Chaque niveau est indépendant et peut être atteint dans n'importe quel ordre",
                                                "explain": "Les niveaux CMMI sont progressifs et séquentiels; on ne peux pas passer directement du niveau 1 au niveau 5."
                                    },
                                    {
                                                "text": "Les processus deviennent progressivement plus prévisibles, documentés, mesurés et optimisés à travers les niveaux",
                                                "explain": ""
                                    },
                                    {
                                                "text": "Le passage entre niveaux dépend uniquement du temps écoulé, pas des actions prises",
                                                "explain": "La progression CMMI requiert des actions concrètes d'amélioration, pas simplement le passage du temps."
                                    },
                                    {
                                                "text": "Au niveau 5, tous les processus sont parfaits et ne nécessitent plus d'amélioration",
                                                "explain": "Même au niveau 5, l'amélioration continue est l'objectif; perfection absolue n'est jamais atteinte."
                                    }
                        ],
                        "correct": 1,
                        "correctExplain": "Le CMMI structure la maturation en cinq niveaux progressifs : Initial (imprévisible), Géré (planifié), Défini (documenté), Quantitativement Géré (mesuré), et Optimisant (en amélioration). Cette progression reflète une évolution logique : d'abord stabiliser et planifier les processus, puis les documenter, ensuite les mesurer quantitativement, et finalement les optimiser continuellement. Cette approche garantit une base solide à chaque niveau avant de progresser."
            },
            {
                        "q": "Quel est le rôle principal de la norme ISO/CEI 90003 dans le cycle de vie logiciel?",
                        "options": [
                                    {
                                                "text": "Définir de manière prescriptive une unique approche obligatoire pour tous les projets",
                                                "explain": "ISO/CEI 90003 fournit un cadre flexible, pas une approche unique et obligatoire pour tous."
                                    },
                                    {
                                                "text": "Établir la structure et le contenu des processus du cycle de vie logiciel et leur documentation",
                                                "explain": ""
                                    },
                                    {
                                                "text": "Remplacer complètement les standards CMMI et éradiquer leur utilisation",
                                                "explain": "ISO/CEI 90003 et CMMI sont complémentaires, pas concurrents ou exclusifs l'un de l'autre."
                                    },
                                    {
                                                "text": "Appliquer uniquement aux petits projets de moins de 10 développeurs",
                                                "explain": "ISO/CEI 90003 est applicable aux projets de toute taille et toute envergure."
                                    }
                        ],
                        "correct": 1,
                        "correctExplain": "ISO/CEI 90003 établit la structure et le contenu des processus du cycle de vie logiciel, couvrant des domaines comme la planification, l'exécution, l'évaluation, la clôture, le développement des exigences, le design, l'implémentation, et les tests. Son rôle est de fournir un cadre documenté et structuré pour gérer le cycle de vie du logiciel de manière systématique et améliore continuellement basé sur l'expérience."
            },
            {
                        "q": "La relation entre le CMMI et le TMMi (Test Maturity Model integration) peut être mieux comprise comme:",
                        "options": [
                                    {
                                                "text": "Le TMMi est un substitut complet qui rend le CMMI obsolète et inutile",
                                                "explain": "Le TMMi est un complément spécialisé au CMMI, pas un remplacement qui rendrait le CMMI obsolète."
                                    },
                                    {
                                                "text": "Le CMMI concerne le développement global tandis que le TMMi se concentre spécifiquement sur l'amélioration des processus de test",
                                                "explain": ""
                                    },
                                    {
                                                "text": "Le TMMi et CMMI traitent exactement les mêmes domaines sans aucune différence",
                                                "explain": "Bien qu'ils se chevauchent, le TMMi offre une spécialisation plus profonde pour les tests."
                                    },
                                    {
                                                "text": "Seules les grandes organisations peuvent utiliser le CMMI, tandis que seules les petites peuvent utiliser le TMMi",
                                                "explain": "La taille de l'organisation ne détermine pas lequel utiliser; c'est plutôt l'objectif et le focus."
                                    }
                        ],
                        "correct": 1,
                        "correctExplain": "Le CMMI est un modèle généaliste couvrant tous les domaines du développement (gestion du projet, exigences, design, implémentation, intégration, tests, etc.), tandis que le TMMi est spécialisé et approfondit spécifiquement les processus de test. Le TMMi complète le CMMI en fournissant une structure détaillée pour la maturité des tests. Cette approche permet aux organisations de se concentrer sur l'amélioration des tests avec une granularité plus fine que ce que le CMMI offer seul."
            },
            {
                        "q": "Parmi les cinq niveaux de maturité du TMMi, quel niveau représente l'état où les processus de test sont planifiés et exécutés conformément aux exigences?",
                        "options": [
                                    {
                                                "text": "Niveau 1 - Initial: Les processus sont ad hoc et imprévisibles",
                                                "explain": "Au niveau 1, les processus sont chaotiques; ce n'est pas conforme aux exigences documentées."
                                    },
                                    {
                                                "text": "Niveau 2 - Géré: Les tests sont planifiés et exécutés conformément aux exigences",
                                                "explain": ""
                                    },
                                    {
                                                "text": "Niveau 3 - Défini: Les processus sont documentés et standardisés",
                                                "explain": "Bien que le niveau 3 implique la documentation, le niveau 2 concerne déjà la conformité aux exigences."
                                    },
                                    {
                                                "text": "Niveau 5 - Optimisation: Les processus sont en amélioration continue optimale",
                                                "explain": "Le niveau 5 est plus avancé et suppose déjà les niveaux antérieurs incluant le planification."
                                    }
                        ],
                        "correct": 1,
                        "correctExplain": "Le niveau 2 - Géré du TMMi se caractérise par le fait que les processus de test sont planifiés et exécutés conformément aux exigences. Le passage du niveau 1 (initial, ad hoc) au niveau 2 représente la première étape concrète vers l'ordre et la prévisibilité. À ce niveau, les tests sont gérés plutôt que réactifs, ce qui constitue une amélioration fondamentale dans la maturité des tests."
            },
            {
                        "q": "Comment le Valued Software Model (VSM) se différencie-t-il fondamentalement du CMMI et du TMMi en termes d'orientation estratégique?",
                        "options": [
                                    {
                                                "text": "Le VSM ignore complètement la qualité et la valeur client pour se concentrer uniquement sur les coûts",
                                                "explain": "Le VSM engloble la qualité ET la valeur client, pas l'un ou l'autre exclusivement."
                                    },
                                    {
                                                "text": "Le VSM se concentre sur la proposition de valeur que le logiciel apporte au client plutôt que sur les processus techniques internes",
                                                "explain": ""
                                    },
                                    {
                                                "text": "Le VSM et le CMMI sont identiques et traitent exactement les mêmes aspects d'amélioration",
                                                "explain": "Le VSM a une orientation client/valeur tandis que le CMMI se concentre sur la maturité des processus."
                                    },
                                    {
                                                "text": "Le VSM s'applique uniquement aux logiciels gratuits et open-source",
                                                "explain": "Le VSM est un modèle universel applicable à tous les types et contextes de développement logiciel."
                                    }
                        ],
                        "correct": 1,
                        "correctExplain": "Le Valued Software Model (VSM) se différencie par son orientation axiomatique vers la création de valeur pour le client. Tandis que le CMMI se concentre sur la maturité des processus et le TMMi sur la maturité des tests, le VSM aligne quatre dimensions : valeur client (satisfaires les besoins), qualité (assurer la performance), efficacité (optimiser les processus), et innovation (promouvoir le changement positif). Cette approche centrique-client offre une perspective stratégique qui complète les cadres techniques."
            },
            {
                        "q": "Lors de l'implémentation intégrée du CMMI, ISO/CEI 90003, et du TMMi, comment une organisation peut-elle gérer efficacement les potentielles redondances et incompatibilités entre ces standards?",
                        "options": [
                                    {
                                                "text": "Choisir un seul standard et rejeter complètement les autres pour éviter la confusion totale",
                                                "explain": "L'exclusivité réduirait les bénéfices; ces standards sont plutôt complémentaires quand bien alignés."
                                    },
                                    {
                                                "text": "Les mapper aux processus organisationnels communs, identifier les synergies, et adapter l'implémentation pour créer un cadre unifié d'amélioration",
                                                "explain": ""
                                    },
                                    {
                                                "text": "Implémenter simultanément et indépendamment tous les standards sans aucune tentative d'intégration",
                                                "explain": "Ceci causerait des inefficacités, des redondances coûteuses, et confusion organisationnelle."
                                    },
                                    {
                                                "text": "Utiliser seulement les parties les plus complexes de chaque standard pour démontrer l'expertise",
                                                "explain": "Choisir uniquement la complexité est contre-productif; efficacité et clarté sont les priorités."
                                    }
                        ],
                        "correct": 1,
                        "correctExplain": "Une implémentation intégrée réussie du CMMI, ISO/CEI 90003, et TMMi requiert une approche stratégique de mapping et d'harmonisation. L'organisation doit identifier comment chaque standard aborde les domaines communs, créer des domaines de processus unifiés qui satisfont les exigences de tous les trois, et établir des métriques cohérentes. Par exemple, les 'processus gérés' du CMMI peuvent être mapés aux structures ISO/CEI 90003 avec le TMMi fournissant la spécialisation du test. Ceci maximise les bénéfices tout en minimisant les doublons."
            },
            {
                        "q": "En considérant les cinq caractéristiques des mesures efficaces définies par ISO/CEI 15939 (pertinence, validité, fiabilité, accessibilité, acceptabilité), quelle serait l'impact organisationnel si une mesure excelle en validité et fiabilité mais échoue complètement sur l'acceptabilité?",
                        "options": [
                                    {
                                                "text": "L'impact serait minimal car la validité et fiabilité sont tout ce qui importe",
                                                "explain": "L'acceptabilité est critique; les mesures rejetées par l'équipe ne seront jamais utilisées efficacement, indépendamment de leur validité."
                                    },
                                    {
                                                "text": "La mesure pourrait être techniquement excellente mais ne serait pas adoptée par l'organisation, réduisant son efficacité pratique à zéro",
                                                "explain": ""
                                    },
                                    {
                                                "text": "Les développeurs l'utiliseraient secrètement sans en informer le management",
                                                "explain": "Le manque d'acceptabilité ne crée pas l'adoption cachée; il crée simplement l'inertie."
                                    },
                                    {
                                                "text": "L'organisation aurait le droit de l'imposer sans consentement de l'équipe",
                                                "explain": "Imposer des mesures sans acceptabilité crée de la résistance et de l'inefficacité organisationnelle."
                                    }
                        ],
                        "correct": 1,
                        "correctExplain": "Cette question illustre la réalité organisationnelle de la mise en place des mesures : une mesure techniquement parfaite mais rejetée par l'équipe sera inefficace. L'acceptabilité n'est pas un 'nice-to-have' ; c'est critique pour le succès. Si une équipe ne comprend pas la mesure, ne la juge pas utile, ou la perçoit comme menaçante, elle trouvera des raisons (conscemment ou inconsciemment) pour l'éviter ou la contourner. L'acceptabilité garantit l'engagement organisationnel sans lequel les meilleures mesures restent des exercices théoriques plutôt que des outils d'amélioration opérationnels."
            }
];

        let currentQuestion = 0;
        let answers = new Array(questions.length).fill(null);
        let answered = new Array(questions.length).fill(false);

        function displayQuestion() {
            const container = document.getElementById('quiz-container');
            const item = questions[currentQuestion];
            
            let html = `<div class="question">${currentQuestion + 1}. ${item.q}</div>`;
            const letters = ['A', 'B', 'C', 'D'];
            item.options.forEach((opt, i) => {
                let classes = '';
                if (answers[currentQuestion] === i) {
                    classes = 'selected ';
                    if (i === item.correct) {
                        classes += 'correct';
                    } else {
                        classes += 'incorrect';
                    }
                }
                const disabledClass = answered[currentQuestion] ? 'disabled' : '';
                html += `<div class="option ${classes} ${disabledClass}" onclick="${answered[currentQuestion] ? '' : `handleAnswerClick(${i})`}" style="${answered[currentQuestion] ? 'cursor: not-allowed;' : ''}"><span class="option-letter">${letters[i]}</span> ${opt.text}</div>`;
            });
            
            container.innerHTML = html;
            
            if (answered[currentQuestion]) {
                showFeedback();
            } else {
                document.getElementById('feedback').innerHTML = '';
                document.getElementById('feedback').classList.remove('show');
            }
            
            updateProgressBar();
            updateNavigationButtons();
            updateProgressInfo();
        }

        function handleAnswerClick(index) {
            if (answered[currentQuestion]) return;
            
            answers[currentQuestion] = index;
            answered[currentQuestion] = true;
            
            showFeedback();
            updateProgressBar();
            updateProgressInfo();
            updateNavigationButtons();
            displayQuestion();
        }

        function showFeedback() {
            const feedbackDiv = document.getElementById('feedback');
            const item = questions[currentQuestion];
            const isCorrect = answers[currentQuestion] === item.correct;
            const selectedOption = item.options[answers[currentQuestion]];
            
            feedbackDiv.className = 'feedback-container show ' + (isCorrect ? 'feedback-correct' : 'feedback-incorrect');
            
            let html = '';
            
            if (isCorrect) {
                html += `
                    <div class="feedback-header">Bonne réponse!</div>
                    <div class="feedback-explanation">${item.correctExplain}</div>
                `;
            } else {
                html += `
                    <div class="feedback-header">Pas tout à fait</div>
                    <div class="feedback-explanation">${selectedOption.explain}</div>
                    <div class="correct-answer-box">
                        <div class="correct-answer-label">✓ Bonne réponse:</div>
                        <div>${item.options[item.correct].text}</div>
                        <div style="margin-top: 8px; font-size: 0.9em;">${item.correctExplain}</div>
                    </div>
                `;
            }
            
            feedbackDiv.innerHTML = html;
        }

        function updateProgressBar() {
            const progressBar = document.getElementById('progressBar');
            progressBar.innerHTML = '';
            
            for (let i = 0; i < questions.length; i++) {
                const segment = document.createElement('div');
                segment.className = 'progress-segment';
                
                if (!answered[i]) {
                    segment.classList.add('unanswered');
                } else if (answers[i] === questions[i].correct) {
                    segment.classList.add('correct');
                } else {
                    segment.classList.add('incorrect');
                }
                
                progressBar.appendChild(segment);
            }
        }

        function updateNavigationButtons() {
            const isAnswered = answered[currentQuestion];
            document.getElementById('prevBtn').disabled = currentQuestion === 0 || !isAnswered;
            document.getElementById('nextBtn').disabled = !isAnswered;
            
            if (currentQuestion === questions.length - 1) {
                document.getElementById('nextBtn').textContent = 'Voir Résultat';
            } else {
                document.getElementById('nextBtn').textContent = 'Suivant →';
            }
        }

        function updateProgressInfo() {
            document.getElementById('question-counter').textContent = `Question ${currentQuestion + 1} / ${questions.length}`;
            
            let correctCount = 0;
            let incorrectCount = 0;
            
            for (let i = 0; i < answers.length; i++) {
                if (answered[i]) {
                    if (answers[i] === questions[i].correct) {
                        correctCount++;
                    } else {
                        incorrectCount++;
                    }
                }
            }
            
            document.getElementById('correct-count').textContent = correctCount;
            document.getElementById('incorrect-count').textContent = incorrectCount;
        }

        function nextQuestion() {
            if (currentQuestion === questions.length - 1) {
                showFinalResults();
                return;
            }
            
            currentQuestion++;
            displayQuestion();
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                displayQuestion();
            }
        }

        function showFinalResults() {
            let score = 0;
            answers.forEach((answer, index) => {
                if (answer === questions[index].correct) score++;
            });
            
            const container = document.getElementById('quiz-container');
            container.innerHTML = '<div class="question">Quiz terminé!</div>';
            
            const feedbackDiv = document.getElementById('feedback');
            feedbackDiv.className = 'feedback-container';
            feedbackDiv.innerHTML = '';
            
            let recapHtml = '<div class="recap-title">Résumé de vos réponses</div>';
            
            questions.forEach((question, index) => {
                const userAnswer = question.options[answers[index]];
                const correctAnswer = question.options[question.correct];
                const isCorrect = answers[index] === question.correct;
                
                recapHtml += `
                    <div class="recap-card ${isCorrect ? 'correct' : 'incorrect'}">
                        <div class="recap-number">Question ${index + 1} / ${questions.length}</div>
                        <div class="recap-question">${question.q}</div>
                        <div class="recap-answer-item user">
                            <span class="recap-label">Votre réponse:</span>
                            ${userAnswer.text}
                            <span class="recap-result ${isCorrect ? 'correct' : 'incorrect'}">
                                ${isCorrect ? '✓ Correct' : '✗ Incorrect'}
                            </span>
                        </div>
                        ${!isCorrect ? `
                            <div class="recap-answer-item correct-answer">
                                <span class="recap-label">Bonne réponse:</span>
                                ${correctAnswer.text}
                            </div>
                        ` : ''}
                    </div>
                `;
            });
            
            document.getElementById('result').innerHTML = `
                <div style="font-size: 2em; margin: 30px 0 20px;">Votre score : ${score} / ${questions.length}</div>
                <div style="font-size: 1.1em; color: #555; margin-bottom: 30px;">Réussite : ${Math.round(score / questions.length * 100)}%</div>
                <div class="recap-container">${recapHtml}</div>
            `;
            
            document.getElementById('prevBtn').disabled = false;
            document.getElementById('nextBtn').textContent = 'Recommencer';
            document.getElementById('nextBtn').disabled = false;
            document.getElementById('nextBtn').onclick = function() { location.reload(); };
            document.getElementById('prevBtn').onclick = function() {
                currentQuestion = questions.length - 1;
                displayQuestion();
            };
        }

        displayQuestion();
    </script>
</body>
</html>
