<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Quiz - Gestion du stress</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <div class="global-course-title">Initiation à la fonction de travail d'un spécialiste de solutions de données</div>
    <h1>Quiz : Gestion du stress et performance (Cours 8)</h1>
    
    <div class="progress-container">
        <div class="progress-info">
            <span id="question-counter">Question 1 / 10</span>
            <div class="progress-stats">
                <span class="stat-badge incorrect"><span class="stat-icon">✕</span><span id="incorrect-count">0</span></span>
                <span class="stat-badge correct"><span class="stat-icon">✓</span><span id="correct-count">0</span></span>
            </div>
        </div>
        <div class="progress-bar-wrapper" id="progressBar"></div>
    </div>
    
    <div id="quiz-container" class="card"></div>
    
    <div id="feedback" class="feedback-container"></div>
    
    <div class="quiz-navigation">
        <button id="prevBtn" onclick="previousQuestion()">← Précédent</button>
        <button id="nextBtn" onclick="nextQuestion()">Suivant →</button>
    </div>
    
    <div id="result"></div>

    <script>
        const questions = [
            {
                q: "Selon les statistiques présentées, quelle proportion de travailleurs canadiens rapporte un niveau de stress élevé ou extrême au quotidien ?",
                options: [
                    { text: "12%", explain: "Faux. 12% correspond aux sources de stress liées aux finances personnelles selon les données de Statistique Canada." },
                    { text: "27%", explain: "Correct. Le cours indique que 27% des travailleurs canadiens ressentent un niveau de stress élevé ou extrême, ce qui représente plus d'un travailleur sur quatre." },
                    { text: "36%", explain: "Faux. 36% représente la proportion de travailleurs dont la source principale de stress est la charge de travail." },
                    { text: "62%", explain: "Faux. 62% est le pourcentage global identifiant le travail comme source principale chez les personnes déjà stressées." }
                ],
                correct: 1,
                correctExplain: "Le cours souligne que 27% des travailleurs au Canada vivent un niveau de stress élevé ou extrême. Ce chiffre illustre l'importance de mettre en place des stratégies de gestion pour maintenir la santé mentale et l'efficacité au travail."
            },
            {
                q: "Qu'est-ce qu'un 'agent stresseur' selon la définition du cours ?",
                options: [
                    { text: "Une réaction de fatigue intense", explain: "Faux. La fatigue est un symptôme physique résultant du stress, pas la cause initiale." },
                    { text: "La source ou la situation précise qui provoque la réaction de stress", explain: "Correct. L'agent stresseur est l'élément déclencheur (charge de travail, délais, relations) qui force l'organisme à mobiliser ses ressources pour s'adapter." },
                    { text: "Un sentiment d'irritabilité constant", explain: "Faux. L'irritabilité est un symptôme émotionnel, une conséquence de l'exposition à un agent stresseur." },
                    { text: "Une méthode de relaxation", explain: "Faux. Les méthodes de relaxation sont des outils pour contrer les effets de l'agent stresseur." }
                ],
                correct: 1,
                correctExplain: "L'agent stresseur est défini comme la source ou la situation provocant la réaction. L'identification adéquate de ces agents (comme des délais serrés ou des incertitudes de projet) est la première étape pour une gestion efficace."
            },
            {
                q: "Dans quelle catégorie de symptômes le cours classe-t-il la 'perte de concentration' ?",
                options: [
                    { text: "Physiques", explain: "Faux. Les symptômes physiques concernent le corps (maux de tête, tensions musculaires, fatigue)." },
                    { text: "Émotionnels", explain: "Faux. Les symptômes émotionnels touchent l'humeur, comme l'anxiété ou l'irritabilité." },
                    { text: "Cognitifs", explain: "Correct. La perte de concentration, les oublis et les erreurs de jugement sont des symptômes cognitifs car ils affectent le traitement de l'information par le cerveau." },
                    { text: "Comportementaux", explain: "Faux. Les symptômes comportementaux concernent les actions visibles, comme l'isolement ou l'agressivité." }
                ],
                correct: 2,
                correctExplain: "La perte de concentration est un symptôme cognitif. Le stress sature les capacités de traitement de l'information, ce qui nuit directement à la performance intellectuelle du spécialiste en données."
            },
            {
                q: "Quelle est la limite biologique de la mémoire de travail mentionnée dans le cours ?",
                options: [
                    { text: "Elle peut retenir environ une centaine d'items pendant une journée", explain: "Faux. La mémoire de travail est extrêmement limitée et volatile, contrairement à la mémoire à long terme." },
                    { text: "Elle ne peut retenir qu'une dizaine d'items pendant environ 1 à 2 heures", explain: "Correct. Le cours précise cette limite biologique pour justifier l'importance d'utiliser un agenda afin de décharger le cerveau." },
                    { text: "Elle n'a pas de limite tant que l'on reste concentré", explain: "Faux. Même avec une concentration totale, la capacité de stockage immédiat reste biologiquement restreinte." },
                    { text: "Elle retient l'information indéfiniment si elle est répétée", explain: "Faux. La mémoire de travail est temporaire; sans transfert vers la mémoire à long terme, l'information s'efface rapidement." }
                ],
                correct: 1,
                correctExplain: "Le cours explique que notre mémoire de travail est saturée après une dizaine d'items et que l'information y est volatile (1 à 2 heures). C'est pourquoi la notation systématique est essentielle pour éviter les oublis stressants."
            },
            {
                q: "En gestion du stress, qu'est-ce qu'un 'séparateur' ?",
                options: [
                    { text: "Un logiciel de gestion de projet", explain: "Faux. C'est une technique humaine et non un outil logiciel." },
                    { text: "Une plage de temps accordée à soi pour interrompre le flux de travail", explain: "Correct. Un séparateur (comme une marche après le dîner) permet de couper l'invasion du travail et de recharger les ressources mentales." },
                    { text: "Une barrière physique entre les serveurs de données", explain: "Faux. Bien que le terme soit utilisé en informatique, ici il s'agit de gestion du temps et du stress." },
                    { text: "Une règle de syntaxe dans un langage de programmation", explain: "Faux. Il s'agit d'un concept de gestion de la fonction de travail." }
                ],
                correct: 1,
                correctExplain: "Un séparateur est une plage de temps pour soi, essentielle pour contrer le sentiment d'envahissement. Le cours suggère des séparateurs quotidiens (pauses) et hebdomadaires (fins de semaine)."
            },
            {
                q: "Pour protéger sa concentration lors d'une tâche complexe, quelle action est recommandée ?",
                options: [
                    { text: "Vérifier ses courriels toutes les 15 minutes", explain: "Faux. Cela crée des interruptions fréquentes qui dégradent la productivité et augmentent le stress." },
                    { text: "S'isoler et couper les notifications (téléphone, courriels)", explain: "Correct. Éliminer les perturbateurs permet de rester dans le flux de travail et de respecter les délais estimés." },
                    { text: "Laisser son bureau ouvert à toute sollicitation", explain: "Faux. Le sentiment d'être sollicité de toutes parts est un agent stresseur majeur." },
                    { text: "Travailler uniquement en multitâche", explain: "Faux. Le multitâche fatigue la mémoire de travail et augmente le risque d'erreurs." }
                ],
                correct: 1,
                correctExplain: "Le cours recommande de s'isoler des éléments perturbateurs, de couper le téléphone et de fermer les courriels pendant les tâches nécessitant une grande concentration pour éviter l'accumulation de retards."
            },
            {
                q: "Quel pourcentage de temps libre devriez-vous idéalement réserver dans votre planning pour les imprévus ?",
                options: [
                    { text: "10%", explain: "Faux. 10% est insuffisant pour absorber les aléas fréquents des projets de solutions de données." },
                    { text: "20%", explain: "Faux. C'est encore trop peu pour garantir que les tâches inachevées ne s'accumulent pas." },
                    { text: "40%", explain: "Correct. Le cours suggère de réserver environ 40% de temps libre pour les imprévus afin de maintenir un planning réaliste et moins stressant." },
                    { text: "0%, il faut planifier chaque minute", explain: "Faux. Un planning sans marge est la garantie de vivre un stress élevé dès qu'un retard survient." }
                ],
                correct: 2,
                correctExplain: "Réserver 40% de son temps pour l'imprévisible permet d'absorber les débordements naturels sans que cela ne devienne une source de stress ou de culpabilité."
            },
            {
                q: "Pourquoi la 'décharge cognitive' par l'agenda est-elle cruciale pour un spécialiste de données ?",
                options: [
                    { text: "Pour prouver à l'employeur que l'on travaille fort", explain: "Faux. C'est un outil personnel de gestion de la charge mentale, pas seulement un outil de rapport." },
                    { text: "Pour libérer la mémoire de travail du stress lié à la peur de l'oubli", explain: "Correct. En notant tout, le cerveau n'a plus à dépenser d'énergie pour 'retenir' la liste, ce qui réduit l'anxiété." },
                    { text: "Parce que c'est une exigence de la Loi 25", explain: "Faux. La Loi 25 concerne la protection des données personnelles, pas la gestion du temps individuelle." },
                    { text: "Pour pouvoir supprimer ses courriels plus rapidement", explain: "Faux. L'agenda sert à planifier l'action, pas à gérer la boîte de réception." }
                ],
                correct: 1,
                correctExplain: "Noter systématiquement les tâches et leur durée permet de libérer la mémoire de travail, évitant ainsi la saturation cognitive et le sentiment d'être dépassé."
            },
            {
                q: "L'irritabilité et l'anxiété sont des manifestations de quel type ?",
                options: [
                    { text: "Physiques", explain: "Faux. Les manifestations physiques sont liées au corps, comme les maux de tête." },
                    { text: "Cognitives", explain: "Faux. Les manifestations cognitives touchent la pensée (oublis, concentration)." },
                    { text: "Émotionnelles", explain: "Correct. Elles concernent l'humeur et l'état psychologique interne face au stress." },
                    { text: "Comportementales", explain: "Faux. Elles deviendraient comportementales si elles se traduisaient par des actes (ex: crier après quelqu'un)." }
                ],
                correct: 2,
                correctExplain: "Le cours identifie l'irritabilité et l'anxiété comme des symptômes émotionnels. Savoir les reconnaître chez soi est essentiel pour appliquer les bonnes stratégies de gestion."
            },
            {
                q: "Que doit faire un spécialiste si une stratégie de gestion du stress ne semble pas efficace ?",
                options: [
                    { text: "Ignorer le problème et continuer d'avancer", explain: "Faux. Ignorer le stress mène à l'épuisement professionnel." },
                    { text: "Effectuer un suivi, ajuster la stratégie ou chercher du soutien", explain: "Correct. Le cours mentionne que l'évaluation de l'efficacité passe par le suivi, l'ajustement et, au besoin, la recherche d'aide auprès des collègues ou supérieurs." },
                    { text: "S'isoler davantage et ne plus parler à personne", explain: "Faux. L'isolement excessif est un symptôme de stress, pas une solution." },
                    { text: "Arrêter de planifier son travail", explain: "Faux. L'absence de planification augmente le chaos et donc le stress." }
                ],
                correct: 1,
                correctExplain: "La gestion du stress est un processus continu. Si une technique échoue, il faut analyser pourquoi, ajuster ses méthodes ou ne pas hésiter à demander de l'aide pour réorganiser sa charge de travail."
            }
        ];

        let currentQuestion = 0;
        let answers = new Array(questions.length).fill(null);
        let answered = new Array(questions.length).fill(false);

        function displayQuestion() {
            const container = document.getElementById('quiz-container');
            const item = questions[currentQuestion];
            
            let html = `<div class="question">${currentQuestion + 1}. ${item.q}</div>`;
            const letters = ['A', 'B', 'C', 'D'];
            item.options.forEach((opt, i) => {
                let classes = '';
                if (answers[currentQuestion] === i) {
                    classes = 'selected ';
                    if (i === item.correct) {
                        classes += 'correct';
                    } else {
                        classes += 'incorrect';
                    }
                }
                const disabledClass = answered[currentQuestion] ? 'disabled' : '';
                html += `<div class="option ${classes} ${disabledClass}" onclick="${answered[currentQuestion] ? '' : `handleAnswerClick(${i})`}" style="${answered[currentQuestion] ? 'cursor: not-allowed;' : ''}"><span class="option-letter">${letters[i]}</span> ${opt.text}</div>`;
            });
            
            container.innerHTML = html;
            
            if (answered[currentQuestion]) {
                showFeedback();
            } else {
                document.getElementById('feedback').innerHTML = '';
                document.getElementById('feedback').classList.remove('show');
            }
            
            updateProgressBar();
            updateNavigationButtons();
            updateProgressInfo();
        }

        function handleAnswerClick(index) {
            if (answered[currentQuestion]) return;
            
            answers[currentQuestion] = index;
            answered[currentQuestion] = true;
            
            showFeedback();
            updateProgressBar();
            updateProgressInfo();
            updateNavigationButtons();
            displayQuestion();
        }

        function showFeedback() {
            const feedbackDiv = document.getElementById('feedback');
            const item = questions[currentQuestion];
            const isCorrect = answers[currentQuestion] === item.correct;
            const selectedOption = item.options[answers[currentQuestion]];
            
            feedbackDiv.className = 'feedback-container show ' + (isCorrect ? 'feedback-correct' : 'feedback-incorrect');
            
            let html = '';
            
            if (isCorrect) {
                html += `
                    <div class="feedback-header">Bonne réponse!</div>
                    <div class="feedback-explanation">${item.correctExplain}</div>
                `;
            } else {
                html += `
                    <div class="feedback-header">Pas tout à fait</div>
                    <div class="feedback-explanation">${selectedOption.explain}</div>
                    <div class="correct-answer-box">
                        <div class="correct-answer-label">✓ Bonne réponse:</div>
                        <div>${item.options[item.correct].text}</div>
                        <div style="margin-top: 8px; font-size: 0.9em;">${item.correctExplain}</div>
                    </div>
                `;
            }
            
            feedbackDiv.innerHTML = html;
        }

        function updateProgressBar() {
            const progressBar = document.getElementById('progressBar');
            progressBar.innerHTML = '';
            
            for (let i = 0; i < questions.length; i++) {
                const segment = document.createElement('div');
                segment.className = 'progress-segment';
                
                if (!answered[i]) {
                    segment.classList.add('unanswered');
                } else if (answers[i] === questions[i].correct) {
                    segment.classList.add('correct');
                } else {
                    segment.classList.add('incorrect');
                }
                
                progressBar.appendChild(segment);
            }
        }

        function updateNavigationButtons() {
            const isAnswered = answered[currentQuestion];
            document.getElementById('prevBtn').disabled = currentQuestion === 0 || !isAnswered;
            document.getElementById('nextBtn').disabled = !isAnswered;
            
            if (currentQuestion === questions.length - 1) {
                document.getElementById('nextBtn').textContent = 'Voir Résultat';
            } else {
                document.getElementById('nextBtn').textContent = 'Suivant →';
            }
        }

        function updateProgressInfo() {
            document.getElementById('question-counter').textContent = `Question ${currentQuestion + 1} / ${questions.length}`;
            
            let correctCount = 0;
            let incorrectCount = 0;
            
            for (let i = 0; i < answers.length; i++) {
                if (answered[i]) {
                    if (answers[i] === questions[i].correct) {
                        correctCount++;
                    } else {
                        incorrectCount++;
                    }
                }
            }
            
            document.getElementById('correct-count').textContent = correctCount;
            document.getElementById('incorrect-count').textContent = incorrectCount;
        }

        function nextQuestion() {
            if (currentQuestion === questions.length - 1) {
                showFinalResults();
                return;
            }
            
            currentQuestion++;
            displayQuestion();
        }

        function previousQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                displayQuestion();
            }
        }

        function showFinalResults() {
            let score = 0;
            answers.forEach((answer, index) => {
                if (answer === questions[index].correct) score++;
            });
            
            const container = document.getElementById('quiz-container');
            container.innerHTML = '<div class="question">Quiz terminé!</div>';
            
            const feedbackDiv = document.getElementById('feedback');
            feedbackDiv.className = 'feedback-container';
            feedbackDiv.innerHTML = '';
            
            let recapHtml = '<div class="recap-title">Résumé de vos réponses</div>';
            
            questions.forEach((question, index) => {
                const userAnswer = question.options[answers[index]];
                const correctAnswer = question.options[question.correct];
                const isCorrect = answers[index] === question.correct;
                
                recapHtml += `
                    <div class="recap-card ${isCorrect ? 'correct' : 'incorrect'}">
                        <div class="recap-number">Question ${index + 1} / ${questions.length}</div>
                        <div class="recap-question">${question.q}</div>
                        <div class="recap-answer-item user">
                            <span class="recap-label">Votre réponse:</span>
                            ${userAnswer.text}
                            <span class="recap-result ${isCorrect ? 'correct' : 'incorrect'}">
                                ${isCorrect ? '✓ Correct' : '✗ Incorrect'}
                            </span>
                        </div>
                        ${!isCorrect ? `
                            <div class="recap-answer-item correct-answer">
                                <span class="recap-label">Bonne réponse:</span>
                                ${correctAnswer.text}
                            </div>
                        ` : ''}
                    </div>
                `;
            });
            
            document.getElementById('result').innerHTML = `
                <div style="font-size: 2em; margin: 30px 0 20px;">Votre score : ${score} / ${questions.length}</div>
                <div style="font-size: 1.1em; color: #555; margin-bottom: 30px;">Réussite : ${Math.round(score / questions.length * 100)}%</div>
                <div class="recap-container">${recapHtml}</div>
            `;
            
            document.getElementById('prevBtn').disabled = false;
            document.getElementById('nextBtn').textContent = 'Recommencer';
            document.getElementById('nextBtn').disabled = false;
            document.getElementById('nextBtn').onclick = function() { location.reload(); };
            document.getElementById('prevBtn').onclick = function() {
                currentQuestion = questions.length - 1;
                displayQuestion();
            };
        }

        displayQuestion();
    </script>
</body>
</html>
